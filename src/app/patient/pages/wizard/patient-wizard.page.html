<div class="wizard-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <mat-icon>event_available</mat-icon>
        Agendar Cita
      </mat-card-title>
      <mat-card-subtitle>
        Selecciona un profesional y luego reserva fecha y hora.
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="content">
      <p>El selector se abre automáticamente al entrar en esta pantalla.</p>
      <button
        mat-raised-button
        color="primary"
        (click)="openRequestAppointment()"
      >
        <mat-icon>search</mat-icon>
        Buscar médico
      </button>
    </mat-card-content>
  </mat-card>
</div>
