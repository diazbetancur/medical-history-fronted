<h2 mat-dialog-title class="dialog-title">
  <mat-icon>group_add</mat-icon>
  <span>Agregar miembro</span>
</h2>

<mat-dialog-content>
  <p class="dialog-description">
    Identifica a la persona por su documento para agregarla a tu grupo familiar.
  </p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="add-dep-form">
    <mat-form-field appearance="outline">
      <mat-label>
        <app-form-label
          text="Tipo de documento"
          [required]="true"
        ></app-form-label>
      </mat-label>
      <mat-select formControlName="documentType">
        @for (t of documentTypes; track t) {
          <mat-option [value]="t">{{ t }}</mat-option>
        }
      </mat-select>
      <app-form-control-error
        [control]="form.controls.documentType"
        [submitted]="submitted()"
        [messages]="messages.documentType"
      ></app-form-control-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>
        <app-form-label
          text="Número de documento"
          [required]="true"
        ></app-form-label>
      </mat-label>
      <input matInput formControlName="documentNumber" maxlength="30" />
      <app-form-control-error
        [control]="form.controls.documentNumber"
        [submitted]="submitted()"
        [messages]="messages.documentNumber"
      ></app-form-control-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>
        <app-form-label text="Nombre completo" [required]="true"></app-form-label>
      </mat-label>
      <input matInput formControlName="fullName" maxlength="200" />
      <app-form-control-error
        [control]="form.controls.fullName"
        [submitted]="submitted()"
        [messages]="messages.fullName"
      ></app-form-control-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="submit()">
    Agregar
  </button>
</mat-dialog-actions>
