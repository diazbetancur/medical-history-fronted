<div class="callback" style="max-width:480px;margin:3rem auto;text-align:center;display:flex;flex-direction:column;gap:1rem;align-items:center;">
  @if (status() === 'success') {
    <mat-icon color="primary" style="font-size:48px;width:48px;height:48px;">check_circle</mat-icon>
    <h2>¡Google Calendar conectado!</h2>
    <p>Calendario: <strong>{{ calendar() }}</strong> · {{ imported() }} eventos importados.</p>
  } @else {
    <mat-icon color="warn" style="font-size:48px;width:48px;height:48px;">error</mat-icon>
    <h2>No se pudo conectar</h2>
    <p>Vuelve a intentarlo desde la configuración.</p>
  }
  <button mat-flat-button color="primary" (click)="goToSettings()">Ir a la configuración</button>
</div>
