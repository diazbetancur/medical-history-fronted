<div class="forgot-container">
  <mat-card class="forgot-card">
    <mat-card-header>
      <mat-card-title>Recuperar Contraseña</mat-card-title>
      <mat-card-subtitle
        >Ingresa tu email para solicitar recuperación</mat-card-subtitle
      >
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>
            <app-form-label text="Email" [required]="true"></app-form-label>
          </mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="paciente@correo.com"
            autocomplete="email"
          />
          <app-form-control-error
            [control]="form.controls.email"
            [submitted]="submitted()"
          ></app-form-control-error>
        </mat-form-field>

        @if (resultMessage()) {
        <div class="info-message">
          <mat-icon>info</mat-icon>
          <span>{{ resultMessage() }}</span>
        </div>
        } @if (errorMessage()) {
        <div class="error-message">
          <mat-icon>error</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>
        }

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="isLoading()"
          class="full-width"
        >
          @if (isLoading()) {
          <mat-spinner diameter="20"></mat-spinner>
          <span>Enviando...</span>
          } @else {
          <span>Solicitar recuperación</span>
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/login">Volver a iniciar sesión</a>
    </mat-card-actions>
  </mat-card>
</div>
