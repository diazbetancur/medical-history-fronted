<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
      <mat-card-subtitle
        >Ingresa tus credenciales para continuar</mat-card-subtitle
      >
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <!-- Email Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>
            <app-form-label text="Email" [required]="true"></app-form-label>
          </mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="ejemplo@email.com"
            autocomplete="email"
          />
          <app-form-control-error
            [control]="form.controls.email"
            [submitted]="submitted()"
            [messages]="loginFormMessages.email"
          ></app-form-control-error>
        </mat-form-field>

        <!-- Password Field -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>
            <app-form-label
              text="Contraseña"
              [required]="true"
            ></app-form-label>
          </mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
          />
          <app-form-control-error
            [control]="form.controls.password"
            [submitted]="submitted()"
            [messages]="loginFormMessages.password"
          ></app-form-control-error>
        </mat-form-field>

        <!-- Error Message -->
        @if (errorMessage()) {
        <div class="error-message">
          <mat-icon>error</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>
        }

        <!-- Submit Button -->
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="isLoading()"
          class="full-width"
        >
          @if (isLoading()) {
          <mat-spinner diameter="20"></mat-spinner>
          <span>Iniciando sesión...</span>
          } @else {
          <span>Ingresar</span>
          }
        </button>

        <div class="forgot-link">
          <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button type="button" routerLink="/" class="back-home-btn">
        <mat-icon>arrow_back</mat-icon>
        Regresar al inicio
      </button>

      <p class="register-link">
        ¿No tienes cuenta?
        <a routerLink="/register">Regístrate aquí</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
