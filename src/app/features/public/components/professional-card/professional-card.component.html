<mat-card
  class="professional-card"
  [class.unavailable]="!professional.isAvailable"
>
  <div class="card-image" [style.background-image]="'url(' + imageUrl + ')'">
    <div class="card-overlay">
      <div class="card-info">
        <h3 class="professional-name">
          {{ professional.fullName | doctorName }}
        </h3>
        <div class="professional-specialties">
          @for (spec of visibleSpecialties; track spec) {
            <span class="specialty-chip">{{ spec }}</span>
          }
          @if (hiddenCount > 0) {
            <span
              class="specialty-chip specialty-chip--more"
              [matTooltip]="hiddenTooltip"
              matTooltipPosition="above"
              >+{{ hiddenCount }}</span
            >
          }
        </div>
      </div>
    </div>
  </div>
  <mat-card-actions>
    <button
      type="button"
      class="book-button pill-btn pill-btn--primary"
      [disabled]="!professional.isAvailable"
      (click)="onBookAppointment()"
    >
      {{ professional.isAvailable ? "Agendar Cita" : "No Disponible" }}
    </button>
  </mat-card-actions>
</mat-card>
