<button
  mat-icon-button
  class="bell-btn"
  [matMenuTriggerFor]="notifMenu"
  (menuOpened)="onBellClick()"
  matTooltip="Notificaciones"
  aria-label="Notificaciones"
>
  <mat-icon
    [matBadge]="unreadCount() > 0 ? (unreadCount() > 99 ? '99+' : unreadCount().toString()) : ''"
    [matBadgeHidden]="unreadCount() === 0"
    matBadgeColor="warn"
    matBadgeSize="small"
    matBadgeOverlap="true"
  >
    notifications
  </mat-icon>
</button>

<mat-menu #notifMenu="matMenu" class="notif-menu" xPosition="before">
  <div class="notif-header" (click)="$event.stopPropagation()">
    <span class="notif-title">Notificaciones</span>
    @if (unreadCount() > 0) {
      <span class="notif-badge">{{ unreadCount() }} nuevas</span>
    }
  </div>

  <mat-divider />

  @if (loadingList()) {
    <div class="notif-loading" (click)="$event.stopPropagation()">
      <mat-spinner diameter="28" />
    </div>
  } @else if (notifications().length === 0) {
    <div class="notif-empty" (click)="$event.stopPropagation()">
      <mat-icon>notifications_none</mat-icon>
      <span>Sin notificaciones</span>
    </div>
  } @else {
    @for (n of notifications(); track n.id) {
      <button
        mat-menu-item
        class="notif-item"
        [class.notif-item--unread]="!n.isRead"
        (click)="navigate(n)"
      >
        <span class="notif-item__dot" [class.notif-item__dot--visible]="!n.isRead"></span>
        <span class="notif-item__content">
          <span class="notif-item__title">{{ n.title }}</span>
          <span class="notif-item__body">{{ n.body }}</span>
          <span class="notif-item__time">{{ formatDate(n.createdAt) }}</span>
        </span>
      </button>
    }
  }
</mat-menu>
